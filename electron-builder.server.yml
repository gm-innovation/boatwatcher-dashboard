appId: com.dockcheck.localserver
productName: Dock Check Local Server
copyright: Copyright © 2026 Dock Check

extends: null

extraMetadata:
  main: electron/local-server-main.js
  type: commonjs

directories:
  output: local-server-dist
  buildResources: build

files:
  - electron/local-server-main.js
  - electron/server-preload.js
  - electron/server-ui.html
  - electron/database.js
  - electron/sync.js
  - electron/agent.js
  - server/**/*
  - build/icon.png
  - public/favicon-512.png
  - package.json
  - node_modules/express/**/*
  - node_modules/cors/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/body-parser/**/*
  - node_modules/content-disposition/**/*
  - node_modules/cookie/**/*
  - node_modules/debug/**/*
  - node_modules/depd/**/*
  - node_modules/destroy/**/*
  - node_modules/encodeurl/**/*
  - node_modules/escape-html/**/*
  - node_modules/etag/**/*
  - node_modules/finalhandler/**/*
  - node_modules/fresh/**/*
  - node_modules/http-errors/**/*
  - node_modules/inherits/**/*
  - node_modules/merge-descriptors/**/*
  - node_modules/methods/**/*
  - node_modules/mime/**/*
  - node_modules/ms/**/*
  - node_modules/on-finished/**/*
  - node_modules/parseurl/**/*
  - node_modules/path-to-regexp/**/*
  - node_modules/proxy-addr/**/*
  - node_modules/qs/**/*
  - node_modules/range-parser/**/*
  - node_modules/raw-body/**/*
  - node_modules/safe-buffer/**/*
  - node_modules/safer-buffer/**/*
  - node_modules/send/**/*
  - node_modules/serve-static/**/*
  - node_modules/setprototypeof/**/*
  - node_modules/statuses/**/*
  - node_modules/type-is/**/*
  - node_modules/unpipe/**/*
  - node_modules/utils-merge/**/*
  - node_modules/vary/**/*
  - node_modules/accepts/**/*
  - node_modules/array-flatten/**/*
  - node_modules/bytes/**/*
  - node_modules/content-type/**/*
  - node_modules/ee-first/**/*
  - node_modules/forwarded/**/*
  - node_modules/ipaddr.js/**/*
  - node_modules/media-typer/**/*
  - node_modules/negotiator/**/*
  - node_modules/object-inspect/**/*
  - node_modules/side-channel/**/*
  - node_modules/toidentifier/**/*
  - node_modules/iconv-lite/**/*
  - node_modules/mime-types/**/*
  - node_modules/mime-db/**/*
  - node_modules/cookie-signature/**/*
  - node_modules/node-addon-api/**/*
  - node_modules/prebuild-install/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*

asarUnpack:
  - node_modules/better-sqlite3/**/*
  - '**/*.node'

npmRebuild: true
generateUpdatesFilesForAllChannels: false

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
  artifactName: DockCheck-Local-Server-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dock Check Local Server
  deleteAppDataOnUninstall: true
  uninstallDisplayName: Dock Check Local Server
  runAfterFinish: true

