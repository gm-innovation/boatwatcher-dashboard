name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --package-lock-only
          npm ci

      - name: Prepare build assets
        run: |
          mkdir build
          copy public\favicon-512.png build\icon.png
        shell: cmd

      - name: Build and publish Local Server release
        run: npm run build:local-server:publish

      - name: Build and publish Desktop release
        run: npm run build:electron:publish
