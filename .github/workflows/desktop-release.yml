name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.repository }}
      GH_REPO_NAME: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnostic - Verify workflow version
        shell: bash
        run: |
          echo "=== CI Fingerprint ==="
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Run attempt: ${{ github.run_attempt }}"
          echo "--- Setup native build tools content ---"
          grep -A 3 "Setup native build tools" .github/workflows/desktop-release.yml || echo "Step not found"
          echo "--- Verifying step uses npx node-gyp install ---"
          if ! grep -A 3 "Setup native build tools" .github/workflows/desktop-release.yml | grep -q "npx node-gyp install"; then
            echo "::error::Step 'Setup native build tools' does not contain 'npx node-gyp install'. Workflow may be stale."
            exit 1
          fi
          echo "✅ Workflow is up-to-date (Setup native build tools uses npx node-gyp install)."

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate version alignment
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            EXPECTED_TAG="v${PKG_VERSION}"
            echo "Git tag: $TAG_NAME | Expected: $EXPECTED_TAG"
            if [[ "$TAG_NAME" != "$EXPECTED_TAG" ]]; then
              echo "::error::Version mismatch! Tag '$TAG_NAME' does not match package.json version '$PKG_VERSION'. Update package.json before tagging."
              exit 1
            fi
            echo "✅ Tag and package.json version are aligned."
          else
            echo "⚠️ Not a tag push (trigger: ${{ github.event_name }}). Publish steps will be skipped."
          fi

      - name: Install dependencies
        run: |
          npm install --package-lock-only --legacy-peer-deps
          npm ci --foreground-scripts --loglevel=verbose --legacy-peer-deps

      - name: Setup native build tools
        shell: bash
        run: npx node-gyp install

      - name: Rebuild better-sqlite3 for Electron
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('electron/package.json').version")
          echo "Rebuilding better-sqlite3 for Electron $ELECTRON_VER"
          npx electron-rebuild -f -w better-sqlite3 -v "$ELECTRON_VER"

      - name: Prepare build assets
        run: |
          mkdir build
          copy public\favicon-512.png build\icon.png
        shell: cmd

      # ── Build web assets ──
      - name: Build web assets (Vite)
        run: npm run build:desktop

      # ── Validate dist assets (prevent white-screen releases) ──
      - name: Validate dist/index.html asset paths
        shell: bash
        run: |
          INDEX="dist/index.html"
          if [ ! -f "$INDEX" ]; then
            echo "::error::dist/index.html not found after build!"
            exit 1
          fi
          # Check for absolute paths like src="/assets/..." (should be "./assets/...")
          if grep -qE '(src|href)="/' "$INDEX"; then
            echo "::error::dist/index.html contains absolute asset paths (must be relative for Electron file:// protocol)!"
            echo "--- Offending lines ---"
            grep -nE '(src|href)="/' "$INDEX"
            exit 1
          fi
          # Check that at least one JS bundle exists
          JS_BUNDLE=$(grep -oE 'src="[^"]*\.js"' "$INDEX" | head -1)
          if [ -z "$JS_BUNDLE" ]; then
            echo "::error::No JS bundle reference found in dist/index.html!"
            exit 1
          fi
          echo "✅ dist/index.html asset paths are relative and JS bundle is present."

      # ── Desktop ──────────────────────────────────────────────
      - name: Build and publish Desktop release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build:electron:publish

      - name: Build Desktop (dry-run, no publish)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build:electron

      # ── Validate Desktop asar contents (after build) ────────
      - name: Validate Desktop asar contents
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          echo "--- Diagnosing electron-dist structure ---"
          if [ ! -d "electron-dist" ]; then
            echo "::error::electron-dist directory does not exist after build!"
            ls -la
            exit 1
          fi
          ls -R electron-dist | head -80

          ASAR=""
          for f in $(find electron-dist -name 'app.asar' -type f 2>/dev/null || true); do
            ASAR="$f"
            break
          done

          if [ -z "$ASAR" ]; then
            echo "::error::app.asar not found inside electron-dist. Full listing:"
            find electron-dist -type f 2>/dev/null | head -50 || true
            exit 1
          fi

          echo "Found asar: $ASAR"
          npx asar list "$ASAR" | head -50
          if ! npx asar list "$ASAR" | grep -q 'dist/index.html'; then
            echo "::error::dist/index.html NOT found inside app.asar!"
            exit 1
          fi
          echo "✅ dist/index.html confirmed inside app.asar"

      # ── Local Server (build once → verify → upload) ────────
      - name: Build Local Server (package only, no publish)
        run: npm run build:local-server

      - name: Verify Local Server artifacts
        shell: bash
        run: |
          echo "--- Checking for Local Server installer ---"
          EXE="$(find local-server-dist -maxdepth 1 -name 'DockCheck-Local-Server-Setup-*.exe' -type f 2>/dev/null | head -1 || true)"
          if [ -z "$EXE" ]; then
            echo "::error::Local Server .exe was NOT generated! The NSIS packaging likely failed."
            echo "Contents of local-server-dist/:"
            ls -la local-server-dist/ 2>/dev/null || echo "(directory does not exist)"
            exit 1
          fi
          SIZE=$(stat --printf='%s' "$EXE" 2>/dev/null || stat -f%z "$EXE" 2>/dev/null || echo "0")
          SIZE_MB=$((SIZE / 1048576))
          echo "✅ Found: $EXE ($SIZE_MB MB)"
          if [ "$SIZE_MB" -lt 10 ]; then
            echo "::error::Local Server .exe is suspiciously small ($SIZE_MB MB). Build may be incomplete."
            exit 1
          fi
          echo "✅ Size check passed."

      - name: Generate server.yml update metadata
        shell: bash
        run: |
          EXE="$(find local-server-dist -maxdepth 1 -name 'DockCheck-Local-Server-Setup-*.exe' -type f 2>/dev/null | head -1 || true)"
          EXE_NAME=$(basename "$EXE")
          SIZE=$(stat --printf='%s' "$EXE" 2>/dev/null || stat -f%z "$EXE" 2>/dev/null)
          SHA512=$(openssl dgst -sha512 -binary "$EXE" | openssl base64 -A)
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          cat > local-server-dist/server.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${EXE_NAME}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${EXE_NAME}
          sha512: ${SHA512}
          releaseDate: '${RELEASE_DATE}'
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' local-server-dist/server.yml

          echo "--- Generated server.yml ---"
          cat local-server-dist/server.yml

      - name: Verify server.yml integrity
        shell: bash
        run: |
          SERVER_YML="local-server-dist/server.yml"
          if [ ! -f "$SERVER_YML" ]; then
            echo "::error::server.yml was not generated!"
            exit 1
          fi

          YML_SHA=$(grep 'sha512:' "$SERVER_YML" | head -1 | sed 's/.*sha512:[[:space:]]*//' | tr -d '[:space:]')
          EXE="$(find local-server-dist -maxdepth 1 -name 'DockCheck-Local-Server-Setup-*.exe' -type f 2>/dev/null | head -1 || true)"
          ACTUAL_SHA=$(openssl dgst -sha512 -binary "$EXE" | openssl base64 -A)

          echo "server.yml sha512: $YML_SHA"
          echo "Actual .exe sha512: $ACTUAL_SHA"

          if [ "$YML_SHA" != "$ACTUAL_SHA" ]; then
            echo "::error::SHA512 MISMATCH! server.yml hash does not match the .exe binary."
            exit 1
          fi
          echo "✅ SHA512 integrity check passed."

      - name: Upload Local Server artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          echo "Uploading Local Server artifacts to release $TAG..."

          # Upload .exe
          EXE="$(find local-server-dist -maxdepth 1 -name 'DockCheck-Local-Server-Setup-*.exe' -type f 2>/dev/null | head -1 || true)"
          echo "Uploading: $EXE"
          gh release upload "$TAG" "$EXE" --clobber

          # Upload server.yml
          echo "Uploading: local-server-dist/server.yml"
          gh release upload "$TAG" "local-server-dist/server.yml" --clobber

          # Upload blockmap if exists
          BLOCKMAP=$(find local-server-dist -maxdepth 1 -name 'DockCheck-Local-Server-Setup-*.exe.blockmap' -type f | head -1)
          if [ -n "$BLOCKMAP" ]; then
            echo "Uploading: $BLOCKMAP"
            gh release upload "$TAG" "$BLOCKMAP" --clobber
          fi

          echo "✅ All Local Server artifacts uploaded successfully."

      - name: Verify release assets on GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          echo "--- Verifying release $TAG assets ---"
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name')
          echo "Assets in release:"
          echo "$ASSETS"

          # Check for Local Server exe
          if echo "$ASSETS" | grep -q 'DockCheck-Local-Server-Setup'; then
            echo "✅ Local Server .exe is present in release."
          else
            echo "::error::Local Server .exe is MISSING from release $TAG!"
            exit 1
          fi

          # Check for server.yml
          if echo "$ASSETS" | grep -q 'server.yml'; then
            echo "✅ server.yml is present in release."
          else
            echo "::error::server.yml is MISSING from release $TAG!"
            exit 1
          fi

          echo "✅ All required artifacts verified."
