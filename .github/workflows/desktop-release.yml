name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate version alignment
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            EXPECTED_TAG="v${PKG_VERSION}"
            echo "Git tag: $TAG_NAME | Expected: $EXPECTED_TAG"
            if [[ "$TAG_NAME" != "$EXPECTED_TAG" ]]; then
              echo "::error::Version mismatch! Tag '$TAG_NAME' does not match package.json version '$PKG_VERSION'. Update package.json before tagging."
              exit 1
            fi
            echo "✅ Tag and package.json version are aligned."
          else
            echo "⚠️ Not a tag push (trigger: ${{ github.event_name }}). Publish steps will be skipped."
          fi

      - name: Install dependencies
        run: |
          npm install --package-lock-only
          npm ci

      - name: Setup native build tools
        shell: cmd
        run: |
          npm config set msvs_version 2022
          npx node-gyp install

      - name: Rebuild better-sqlite3 for Electron
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('electron/package.json').version")
          echo "Rebuilding better-sqlite3 for Electron $ELECTRON_VER"
          npx electron-rebuild -f -w better-sqlite3 -v "$ELECTRON_VER"

      - name: Prepare build assets
        run: |
          mkdir build
          copy public\favicon-512.png build\icon.png
        shell: cmd

      # ── Desktop ──────────────────────────────────────────────
      - name: Build and publish Desktop release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build:electron:publish

      - name: Build Desktop (dry-run, no publish)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build:electron

      # ── Local Server ─────────────────────────────────────────
      - name: Build Local Server (package only)
        run: npm run build:local-server

      - name: Verify Local Server executable exists
        shell: bash
        run: |
          echo "--- Checking for Local Server installer ---"
          EXE=$(find local-server-dist -maxdepth 1 -name 'DockCheck-Local-Server-Setup-*.exe' -type f 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then
            echo "::error::Local Server .exe was NOT generated! The NSIS packaging likely failed."
            echo "Contents of local-server-dist/:"
            ls -la local-server-dist/ 2>/dev/null || echo "(directory does not exist)"
            exit 1
          fi
          SIZE=$(stat --printf='%s' "$EXE" 2>/dev/null || stat -f%z "$EXE" 2>/dev/null || echo "0")
          SIZE_MB=$((SIZE / 1048576))
          echo "✅ Found: $EXE ($SIZE_MB MB)"
          if [ "$SIZE_MB" -lt 10 ]; then
            echo "::error::Local Server .exe is suspiciously small ($SIZE_MB MB). Build may be incomplete."
            exit 1
          fi
          echo "✅ Size check passed."

      - name: Publish Local Server to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build:local-server:publish

      - name: Verify Local Server update artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          echo "--- Checking server.yml integrity ---"
          SERVER_YML=""
          if [ -f "local-server-dist/server.yml" ]; then
            SERVER_YML="local-server-dist/server.yml"
          fi

          if [ -z "$SERVER_YML" ]; then
            echo "INFO: server.yml not found locally (uploaded directly to GitHub Release — expected with --publish always)"
            echo "Skipping local integrity check."
            exit 0
          fi

          echo "server.yml found at $SERVER_YML:"
          cat "$SERVER_YML"

          YML_SHA=$(grep -oP 'sha512:\s*\K\S+' "$SERVER_YML" | head -1)
          if [ -z "$YML_SHA" ]; then
            echo "WARNING: Could not extract sha512 from server.yml"
            exit 0
          fi

          EXE_NAME=$(grep -oP 'url:\s*\K\S+' "$SERVER_YML" | head -1)
          EXE_PATH="local-server-dist/$EXE_NAME"
          if [ ! -f "$EXE_PATH" ]; then
            echo "INFO: $EXE_NAME not found locally (uploaded directly). Skipping hash check."
            exit 0
          fi

          ACTUAL_SHA=$(openssl dgst -sha512 -binary "$EXE_PATH" | openssl base64 -A)
          echo "server.yml sha512: $YML_SHA"
          echo "Actual .exe sha512: $ACTUAL_SHA"

          if [ "$YML_SHA" != "$ACTUAL_SHA" ]; then
            echo "::error::SHA512 MISMATCH! server.yml hash does not match the .exe binary."
            exit 1
          fi

          echo "✅ SHA512 integrity check passed."
