appId: com.dockcheck.desktop
productName: Dock Check Desktop
copyright: Copyright © 2026 Dock Check

directories:
  output: electron-dist
  buildResources: build

generateUpdatesFilesForAllChannels: true

files:
  - dist/**/*
  - electron/**/*

publish:
  provider: github
  owner: ${env.GH_OWNER}
  repo: ${env.GH_REPO}
  releaseType: release
  vPrefixedTagName: true

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dock Check

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.business
  icon: build/icon.png

# Electron main process entry
extends: null
