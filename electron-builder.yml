appId: com.dockcheck.desktop
productName: Dock Check Desktop
copyright: Copyright © 2026 Dock Check

directories:
  output: electron-dist
  buildResources: build

files:
  - dist/**/*
  - electron/**/*

# Release publishing config lives in electron-builder.release.yml

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
  artifactName: DockCheck-Desktop-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dock Check

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.business
  icon: build/icon.png

# Electron main process entry
extends: null

extraMetadata:
  type: commonjs
