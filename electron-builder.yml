appId: com.dockcheck.desktop
productName: Dock Check Desktop
copyright: Copyright © 2026 Dock Check

directories:
  output: electron-dist
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - public/favicon.ico

extraResources:
  - from: public/favicon.ico
    to: favicon.ico

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/favicon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/favicon.ico
  uninstallerIcon: public/favicon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BoatWatcher

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  icon: public/favicon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.business
  icon: public/favicon.ico

# Electron main process entry
extends: null
