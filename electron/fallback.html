<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dock Check – Falha na inicialização</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .container { max-width: 480px; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #f8fafc; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .version { font-size: 0.8rem; color: #64748b; margin-bottom: 2rem; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 0.6rem 1.5rem; border-radius: 6px; border: none;
      font-size: 0.9rem; cursor: pointer; font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .error-detail {
      margin-top: 1.5rem; padding: 1rem; background: #1e293b;
      border-radius: 6px; text-align: left; font-size: 0.8rem;
      color: #94a3b8; max-height: 120px; overflow-y: auto;
      font-family: 'Courier New', monospace; word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚠️</div>
    <h1>Falha na inicialização</h1>
    <p>
      O aplicativo não conseguiu carregar a interface.
      Isso pode ocorrer após uma atualização ou por arquivos corrompidos.
    </p>
    <div class="version" id="version-info">Versão: carregando...</div>
    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">Recarregar</button>
      <button class="btn-secondary" id="btn-logs" style="display:none">Abrir pasta de logs</button>
      <button class="btn-secondary" id="btn-devtools">Abrir DevTools</button>
    </div>
    <div class="error-detail" id="error-detail" style="display:none"></div>
  </div>
  <script>
    try {
      const params = new URLSearchParams(window.location.search);
      const hash = window.location.hash;
      const reason = params.get('reason') || (hash && decodeURIComponent(hash.slice(1))) || '';
      const version = params.get('version') || '';

      if (version) {
        document.getElementById('version-info').textContent = 'Versão: ' + version;
      }
      if (reason) {
        const el = document.getElementById('error-detail');
        el.textContent = reason;
        el.style.display = 'block';
      }
    } catch (_) {}

    document.getElementById('btn-devtools').addEventListener('click', () => {
      if (window.electronAPI && window.electronAPI.openDevTools) {
        window.electronAPI.openDevTools();
      }
    });
  </script>
</body>
</html>
